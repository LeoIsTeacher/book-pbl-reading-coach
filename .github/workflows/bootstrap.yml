name: Bootstrap repository

on:
  push:
    paths:
      - book-pbl-reading-coach.zip
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unpack and validate
        run: |
          unzip -o book-pbl-reading-coach.zip
          python tests/validate_repository.py
          rm book-pbl-reading-coach.zip
          rm .github/workflows/validate-skill.yml
      - name: Commit initialized repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Initialize book PBL reading coach skill"
          git push
